spring:
  config:
    import: optional:file:.env.prod[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "https://api.hvordangikkquizen.no/login/oauth2/code/google"

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  forward-headers-strategy: framework

cors:
  allowed-origin: https://hvordangikkquizen.no
